services:
  - type: web
    name: uefa-euro-backend
    env: node
    region: ohio
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: JWT_SECRET
        value: supersecretkey
      - key: ADMIN_EMAIL
        value: admin@eurocards.local
      - key: ADMIN_PASSWORD
        value: Admin2024!
      - key: DATABASE_FILE
        value: ./database.sqlite
      - key: FRONTEND_URL
        value: https://uefa-euro-collectible-cards.vercel.app
      - key: NODE_ENV
        value: production
